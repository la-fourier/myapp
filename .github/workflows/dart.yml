name: Flutter Web Build and Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Erforderlich für Push zu pages branch
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Vollständige History für Branch-Operationen
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version nicht angeben für neueste stable Version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Analyze project source
        run: flutter analyze
      
      - name: Run tests
        run: flutter test
      
      - name: Build for web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd build/web
          
          # Konfiguriere Git
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Initialisiere neues Git Repository im build/web Ordner
          git init
          git add .
          git commit -m "Deploy to GitHub Pages from ${GITHUB_SHA::7}"
          
          # Push zum pages branch (erzwinge Überschreiben)
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:pages
