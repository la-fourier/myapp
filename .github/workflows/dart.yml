name: Dart Web Build and Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Analyze project source
        run: dart analyze
      
      - name: Run tests
        run: dart test
      
      - name: Build for web
        run: dart compile js -o web/main.dart.js web/main.dart
      
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          # Konfiguriere Git
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Checkout pages branch (erstelle falls nicht vorhanden)
          git fetch origin pages:pages || git checkout --orphan pages
          git checkout pages
          
          # Lösche alten Inhalt
          git rm -rf . || true
          
          # Kopiere Web-Build
          git checkout master -- web/
          mv web/* .
          rmdir web
          
          # Commit und Push
          git add .
          git commit -m "Deploy to GitHub Pages from master@${GITHUB_SHA::7}" || echo "No changes to commit"
          git push origin pages --force
