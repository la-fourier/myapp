name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_local_notifications: ^19.5.0
  flutter_localizations:
    sdk: flutter
  table_calendar: ^3.2.0
  provider: ^6.1.5+1
  fluttertoast: ^9.0.0
  google_fonts: ^6.2.1

  # ---- Google Drive Integration ----
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  http: ^1.2.2

  # ---- GitHub Integration ----
  flutter_web_auth_2: ^3.0.0
  
  # ---- Lokale & sichere Speicherung ----
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  json_annotation: ^4.9.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts: 
  - family: Fredericka the Great
    fonts:
      - asset: assets/Fredericka_the_Great/FrederickatheGreat-Regular.ttf